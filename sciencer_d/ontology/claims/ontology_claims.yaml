claims:
  - claim_id: O1_STATE_AVAILABILITY
    title: State availability and report
    statement: Measurable neural dynamics may track whether information is available for report and behavior.
    status: O-B
    ladder_level: H1
    required_evidence:
      - Replication with explicit state labels, matched baselines, and held-out evaluation
    guardrails:
      - State classification does not establish subjective content or ontology
    score_inputs:
      empirical_support: 4
      phenomenological_depth: 3
      metaphysical_coherence: 2
      falsifiability: 4
      btc_icft_relevance: 4
      risk_of_overclaim: 1

  - claim_id: O2_MINIMAL_AWARENESS
    title: Minimal awareness
    statement: Minimal phenomenal awareness can be treated as a bounded phenomenological and empirical research target.
    status: O-B
    ladder_level: H2
    required_evidence:
      - Convergent first-person and behavioral protocols with explicit alternative explanations
    guardrails:
      - Minimal-report conditions require controls for arousal, memory, and task demand
    score_inputs:
      empirical_support: 4
      phenomenological_depth: 4
      metaphysical_coherence: 3
      falsifiability: 4
      btc_icft_relevance: 4
      risk_of_overclaim: 1

  - claim_id: O3_NONDUAL_AWARENESS
    title: Nondual awareness
    statement: Nondual reports may be represented as a phenomenological state-space candidate without metaphysical inference.
    status: O-C
    ladder_level: H3
    required_evidence:
      - Preregistered phenomenology with longitudinal and cross-tradition measurement invariance
    guardrails:
      - A reported state does not establish a universal ontology
    score_inputs:
      empirical_support: 2
      phenomenological_depth: 5
      metaphysical_coherence: 3
      falsifiability: 2
      btc_icft_relevance: 2
      risk_of_overclaim: 3

